name: One-time Dart format

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - run: dart format lib/widgets/sync_orb_loader.dart test/visual_review_test.dart
      - name: Commit formatting
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/widgets/sync_orb_loader.dart test/visual_review_test.dart
          git commit -m "style: apply Dart formatting"
          git push
