name: 功能建议
description: 建议新的功能、交互或视觉改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 描述当前使用场景和遇到的不便。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述希望增加的功能或交互方式。
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 功能区域
      options:
        - 首页仪表盘
        - 账号详情
        - 设置与连接
        - 通知与后台任务
        - 视觉与动效
        - 其他
    validations:
      required: true
