name: Bug 报告
description: 报告可复现的异常、崩溃或数据显示问题
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿提交 Management API 地址、管理密码、认证文件或完整日志中的敏感信息。
  - type: input
    id: version
    attributes:
      label: App 版本
      placeholder: 例如 0.6.2+9
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 设备与 Android 版本
      placeholder: 例如 Pixel 9 / Android 16
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 说明实际表现以及你原本期望的结果。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 脱敏日志或截图
      description: 请先隐藏域名、邮箱、Token、密码和认证 ID。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认内容中不包含地址、密码、Token 或认证文件。
          required: true
